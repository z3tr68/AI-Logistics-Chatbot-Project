<!DOCTYPE html>
<html>

<head>
    <title>Logistics AI Chatbot</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            margin: 0;
        }

        .chat-container {
            width: 100%;
            max-width: 700px;
            margin: 0 auto;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
        }

        .message {
            padding: 10px 15px;
            margin: 10px 0;
            border-radius: 10px;
            max-width: 70%;
        }

        .user {
            background: #007bff;
            color: white;
            margin-left: auto;
        }

        .bot {
            background: #e5e5ea;
            color: black;
            margin-right: auto;
        }

        .input-area {
            display: flex;
            padding: 10px;
            background: white;
            border-top: 1px solid #ddd;
        }

        input {
            flex: 1;
            padding: 10px;
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            margin-left: 10px;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="chat-container">
        <div id="messages" class="messages"></div>

        <div class="input-area">
            <input id="input" placeholder="Ask about your shipment..." />
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        let sessionId = "user-1";

        function addMessage(text, sender) {
            const msgDiv = document.createElement("div");
            msgDiv.classList.add("message", sender);
            msgDiv.innerText = text;

            document.getElementById("messages").appendChild(msgDiv);
            document.getElementById("messages").scrollTop =
                document.getElementById("messages").scrollHeight;
        }

        async function sendMessage() {
            const input = document.getElementById("input");
            const message = input.value;

            if (!message) return;

            addMessage(message, "user");
            input.value = "";

            const res = await fetch("http://127.0.0.1:8000/chat", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    session_id: sessionId,
                    message: message
                })
            });

            const data = await res.json();

            addMessage(data.response, "bot");
        }
    </script>

</body>

</html>
